name = "shopping-list-pwa"
main = "src/worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
assets = { directory = "./public" }

[[routes]]
pattern = "shopping-list.everyday-apps.org"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "shopping-list-pwa"
database_id = "02905165-2d5b-417c-ad57-4c03fb346c47"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1