<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
    <title>Pascals Einkaufsliste</title>
</head>

<body>
    <main class="app">
        <header>
            <div>
                <p class="eyebrow">Pascals Einkaufsliste</p>
                <h1 id="greeting">Hi, Pascal</h1>
            </div>
            <p class="hint">PWA</p>
        </header>

        <section class="card">
            <div id="list-tabs" class="tabs"></div>
            <h2 id="list-title">Home</h2>
            <ul id="items" class="items"></ul>
        </section>

        <section class="input-section">
            <div id="add-message" class="add-message" aria-live="polite"></div>
            <div id="suggestions" class="suggestions"></div>
            <div class="search-input-wrapper">
                <input id="item-input" type="text" placeholder="Ich brauche..." autocomplete="off">
                <button id="cancel-input" class="cancel-btn">Abbrechen</button>
            </div>
        </section>
    </main>
    <script type="module" src="/assets/index.js"></script>
</body>

</html>
