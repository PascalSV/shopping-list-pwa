<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#007aff">
    <title>Einkaufsliste</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    
    <!-- Google Fonts - Inter (modern, clean font) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <!-- Login Page -->
    <div id="login-page" class="page">
        <div class="content login-content">
            <div class="login-container">
                <div class="login-icon">🛒</div>
                <h2>Willkommen</h2>
                <p>Bitte Passwort eingeben</p>
                
                <input id="password-input" type="password" placeholder="Passwort" class="input-underbar">
                
                <button id="login-button" class="button-large">
                    Anmelden
                </button>
                
                <div id="login-error" class="error-message"></div>
            </div>
        </div>
    </div>

    <!-- Main Shopping List Page -->
    <div id="main-page" class="page" style="display: none;">
        <header class="toolbar">
            <button id="back-button" class="toolbar-button" aria-label="Zurück">
                ‹ Listen
            </button>
            <div style="display: flex; gap: 8px;">
                <button id="wake-lock-btn" class="toolbar-button" aria-label="Wake Lock" title="Bildschirm aktiv halten">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                </button>
                <button id="logout-button" class="toolbar-button" aria-label="Abmelden">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>
        </header>
        
        <div class="content">
            <!-- Shopping List Items -->
            <ul id="shopping-list" class="list-inset">
                <!-- Items will be dynamically added here -->
            </ul>
            
            <!-- Search Results -->
            <ul id="search-results" class="list-inset search-results" style="display: none;">
                <!-- Search results will be dynamically added here -->
            </ul>
            
            <div id="empty-message" class="empty-message" style="display: none;">
                <div class="empty-icon">✓</div>
                <p>Fertig! Deine Einkaufsliste ist leer.</p>
            </div>
        </div>
        
        <!-- Edit Modal Overlay -->
        <div id="edit-modal" class="edit-modal" style="display: none;">
            <div class="edit-modal-content">
                <h2>Artikel bearbeiten</h2>
                <div class="edit-form">
                    <label>Artikelname</label>
                    <input id="edit-article-name" type="text" class="input-underbar" placeholder="Artikelname">
                    
                    <label>Bemerkung</label>
                    <input id="edit-remark" type="text" class="input-underbar" placeholder="Bemerkung (optional)">
                    
                    <div class="edit-buttons">
                        <button id="cancel-edit" class="button-large cancel-edit-button">Abbrechen</button>
                        <button id="save-edit" class="button-large">Speichern</button>
                    </div>
                    
                    <button id="delete-article" class="button-large delete-article-button">Artikel löschen</button>
                </div>
            </div>
        </div>
        
        <div class="footer-search" id="footer-search">
            <div id="frequent-items" class="frequent-items" style="display: none;">
                <ul id="frequent-items-list" class="list-inset frequent-list">
                    <!-- Frequent items will be dynamically added here -->
                </ul>
            </div>
            <div class="search-input-wrapper">
                <input id="search-input" type="text" placeholder="Artikel suchen..." class="input-underbar">
                <button id="cancel-search" class="cancel-button">Abbrechen</button>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
