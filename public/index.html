<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Einkaufsliste" />
    <meta name="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Splash screen images for different iPhone models -->
    <!-- iPhone 11 Pro Max (2796x1290) -->
    <link rel="apple-touch-startup-image" href="/splash-screen.svg"
        media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone 11 Pro / X (2436x1125) -->
    <link rel="apple-touch-startup-image" href="/splash-screen.svg"
        media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone 11 / XR (1792x828) -->
    <link rel="apple-touch-startup-image" href="/splash-screen.svg"
        media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" />
    <!-- iPhone 8 Plus (1920x1080) -->
    <link rel="apple-touch-startup-image" href="/splash-screen.svg"
        media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone 8 (1125x2436) -->
    <link rel="apple-touch-startup-image" href="/splash-screen.svg"
        media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
    <!-- iPad (2048x2732) -->
    <link rel="apple-touch-startup-image" href="/splash-screen.svg"
        media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
    <title>Pascals Einkaufsliste</title>
</head>

<body>
    <main class="app">
        <header>
            <div>
                <p class="eyebrow">Pascals Einkaufsliste</p>
                <h1 id="greeting">Hi, Pascal</h1>
            </div>
            <p class="hint">PWA</p>
        </header>

        <section class="card">
            <div id="list-tabs" class="tabs"></div>
            <h2 id="list-title">Home</h2>
            <ul id="items" class="items"></ul>
        </section>

        <div id="suggestions" class="suggestions"></div>

        <section class="input-section">
            <div class="search-input-wrapper">
                <input id="item-input" type="text" placeholder="Ich brauche..." autocomplete="off">
                <button id="cancel-input" class="cancel-btn">Abbrechen</button>
            </div>
        </section>
    </main>
    <script type="module" src="/assets/index.js"></script>
</body>

</html>
