<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with rounded corners for iOS style -->
  <rect width="512" height="512" rx="115" fill="#78909c"/>
  
  <!-- Shopping cart icon -->
  <g transform="translate(256, 256)">
    <!-- Cart body -->
    <path d="M -80,-100 L -60,-40 L 60,-40 L 80,-100 Z" fill="white" stroke="white" stroke-width="8" stroke-linejoin="round"/>
    
    <!-- Cart handle -->
    <rect x="-90" y="-120" width="12" height="40" rx="6" fill="white"/>
    
    <!-- Cart items (3 rectangles inside) -->
    <rect x="-40" y="-80" width="20" height="30" rx="4" fill="#f8f9fa"/>
    <rect x="-10" y="-85" width="20" height="35" rx="4" fill="#f8f9fa"/>
    <rect x="20" y="-75" width="20" height="25" rx="4" fill="#f8f9fa"/>
    
    <!-- Wheels -->
    <circle cx="-40" cy="0" r="16" fill="white"/>
    <circle cx="40" cy="0" r="16" fill="white"/>
    
    <!-- Wheel centers -->
    <circle cx="-40" cy="0" r="8" fill="#78909c"/>
    <circle cx="40" cy="0" r="8" fill="#78909c"/>
  </g>
  
  <!-- Small accent circles for modern look -->
  <circle cx="440" cy="72" r="8" fill="white" opacity="0.3"/>
  <circle cx="460" cy="95" r="5" fill="white" opacity="0.2"/>
</svg>
